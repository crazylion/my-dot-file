"$schema" = 'https://starship.rs/config-schema.json'

# Two-line prompt: line 1 = context (path · git · languages · duration · clock),
# line 2 = the prompt character. Requires a Nerd Font (MesloLGS Nerd Font).
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nodejs$golang$dart$ruby$php$java\
$cmd_duration\
$time
$character"""

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false
read_only = "  "
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ---- languages: only shown inside a relevant project ----
[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version )]($style)"

[dart]
symbol = " "
style = "blue"
format = "[$symbol($version )]($style)"

[ruby]
symbol = " "
style = "red"
format = "[$symbol($version )]($style)"

[php]
symbol = " "
style = "147"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "red"
format = "[$symbol($version )]($style)"

# ---- extras ----
[cmd_duration]
min_time = 2000
style = "yellow"
format = "[ $duration]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "bright-black"
format = "[ $time]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold green)"
